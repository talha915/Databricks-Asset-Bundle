# This is a Databricks asset bundle definition for dlt_pipeline.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dlt_pipeline
  uuid: 06aaa2ed-25f2-4c63-8240-7776dc2c4848

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-e2cc7ffb-3f21.cloud.databricks.com
    variables:
      catalog: ai_lab
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-e2cc7ffb-3f21.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/tz915426@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/tz915426@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ai_lab
      schema: prod
    permissions:
      - user_name: tz915426@gmail.com
        level: CAN_MANAGE
